<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Transcript RAG Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="logo-area">
        <svg class="yt-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.11C19.517 3.545 12 3.545 12 3.545s-7.516 0-9.387.507a3.003 3.003 0 0 0-2.11 2.11C0 8.033 0 12 0 12s0 3.969.503 5.837a3.003 3.003 0 0 0 2.11 2.11c1.871.507 9.387.507 9.387.507s7.517 0 9.387-.507a3.003 3.003 0 0 0 2.11-2.11C24 15.969 24 12 24 12s0-3.967-.502-5.837z" fill="#FF0000"/>
          <path d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z" fill="#FFF"/>
        </svg>
        <h1>Antigravity RAG</h1>
      </div>
      <div class="status-indicator" id="statusIndicator">
        <span class="pulse"></span>
        <span class="status-text">Ready</span>
      </div>
    </header>

    <main class="chat-area">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">💬</div>
        <h2>Chat with this Video</h2>
        <p>Ask questions about key moments, summaries, or specific topics covered in this YouTube video.</p>
        <div class="quick-prompts">
          <button class="quick-btn" data-prompt="Summarize this video in 3 bullet points.">📝 Summarize Video</button>
          <button class="quick-btn" data-prompt="What are the key takeaways?">🔑 Key Takeaways</button>
        </div>
      </div>
      <div class="chatbox" id="chatbox" style="display: none;"></div >
      <div class="loading-spinner" id="loadingSpinner" style="display: none;">
        <div class="spinner"></div>
        <span id="loadingText">Processing video transcript...</span>
      </div>
    </main>

    <footer class="input-area">
      <div class="input-wrapper">
        <input type="text" id="query" placeholder="Ask anything about the video..." autocomplete="off" disabled>
        <button id="sendBtn" class="send-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
